<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد حضور لقاء تعليم عسير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; }
        .moe-green { color: #00735C; }
        .bg-moe-green { background-color: #00735C; }
        .bg-moe-gold { background-color: #a88532; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
    
    <div class="p-6 text-center border-b border-gray-50 bg-white">
        <img src="logo.png" class="h-20 mx-auto object-contain">
    </div>

    <div class="p-8">
        
        <!-- الصفحة الأولى -->
        <div id="step1" class="step active text-center">
            <p class="text-gray-500 text-sm mb-1 font-semibold">لقاء</p>
            <h2 class="text-xl font-bold moe-green mb-4 Amiri">صاحب السمو الملكي الأمير</h2>
            <div class="my-6">
                <img src="trky.png" class="max-w-[240px] mx-auto">
                <p class="font-bold text-gray-700 mt-4 text-xs Amiri">أمير منطقة عسير ورئيس هيئة تطويرها</p>
            </div>
            <div class="bg-green-50 p-6 rounded-2xl mb-8 border-r-8 border-moe-green">
                <p class="text-lg font-extrabold text-gray-800 Amiri">
                    بـحـرّاس وبـوَّابـي <br> مدارس تعليم عسير
                </p>
            </div>
            <button onclick="nextStep(2)" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold hover:bg-opacity-90 transition">
                تـسـجـيـل الـحـضـور
            </button>
        </div>

        <!-- صفحة الإدخال -->
        <div id="step2" class="step">
            <h3 class="text-lg font-bold text-center mb-6">بيانات تأكيد الحضور</h3>

            <form id="attendanceForm" class="space-y-4">

                <!-- ✅ الوظيفة -->
                <select id="job" required class="w-full p-4 bg-gray-50 border rounded-xl">
                    <option value="" disabled selected>اختر الوظيفة</option>
                    <option>مدير/ة</option>
                    <option>حارس رسمي</option>
                    <option>بواب شركة سمايا</option>
                </select>

                <input type="text" id="fullName" placeholder="الاسم الرباعي" required class="w-full p-4 bg-gray-50 border rounded-xl">

                <input type="text" id="nationalId" maxlength="10" pattern="[0-9]{10}" placeholder="السجل المدني (10 أرقام)" required class="w-full p-4 bg-gray-50 border rounded-xl">

                <select id="city" required class="w-full p-4 bg-gray-50 border rounded-xl">
                    <option value="" disabled selected>اختر المحافظة</option>
                    <option>أبها</option>
                    <option>خميس مشيط</option>
                    <option>بيشة</option>
                    <option>النماص</option>
                    <option>محايل عسير</option>
                    <option>ظهران الجنوب</option>
                    <option>سراة عبيدة</option>
                    <option>رجال ألمع</option>
                    <option>تثليث</option>
                    <option>تنومة</option>
                    <option>أحد رفيدة</option>
                    <option>المجاردة</option>
                    <option>بارق</option>
                    <option>بلقرن</option>
                    <option>الحرجة</option>
                    <option>طريب</option>
                </select>

                <input type="text" id="phone" maxlength="10" pattern="05[0-9]{8}" placeholder="رقم الجوال (05xxxxxxxx)" required class="w-full p-4 bg-gray-50 border rounded-xl">

                <input type="text" id="school" placeholder="المدرسة" required class="w-full p-4 bg-gray-50 border rounded-xl">

                <button type="submit" id="submitBtn" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold transition">
                    تأكيد الحضور والاستلام
                </button>
            </form>
        </div>

        <!-- صفحة النجاح -->
        <div id="step3" class="step text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto text-3xl moe-green">✓</div>
                <h3 class="text-xl font-bold mt-4">تم التسجيل بنجاح</h3>
                <p class="text-gray-500 text-sm mt-2">شكراً لحضوركم الجميل</p>
            </div>
        </div>

    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpdVb_EgEFA0JJeY-cjW_SIN78TY0L3DZSKwgA8e_T14hFRdsM3FSDI5hiI9723uYH/exec";

function nextStep(step) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');
}

document.getElementById('attendanceForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const nationalId = document.getElementById('nationalId').value;
    const phone = document.getElementById('phone').value;

    if(nationalId.length !== 10 || phone.length !== 10){
        alert("تأكد من إدخال 10 أرقام صحيحة");
        return;
    }

    btn.innerHTML = "⏳ جاري التسجيل...";
    btn.disabled = true;

    const payload = {
        job: document.getElementById('job').value,
        name: document.getElementById('fullName').value,
        id: nationalId,
        city: document.getElementById('city').value,
        phone: phone,
        school: document.getElementById('school').value
    };

    try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status === 'success') {
            nextStep(3);
        } else {
            alert("حدث خطأ: " + result.message);
            btn.innerHTML = "تأكيد الحضور والاستلام";
            btn.disabled = false;
        }
    } catch (error) {
        alert("تعذر الاتصال بالخادم");
        btn.innerHTML = "تأكيد الحضور والاستلام";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
