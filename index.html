<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد حضور لقاء تعليم عسير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; }
        .moe-green { color: #00735C; }
        .bg-moe-green { background-color: #00735C; }
        .bg-moe-gold { background-color: #a88532; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
    
    <div class="p-6 text-center border-b border-gray-50 bg-white">
        <img src="logo.png" class="h-20 mx-auto object-contain">
    </div>

    <div class="p-8">
        
        <!-- الصفحة الأولى -->
        <div id="step1" class="step active text-center">
            <p class="text-gray-500 text-sm mb-1 font-semibold">برعاية</p>
            <h2 class="text-xl font-bold moe-green mb-4 Amiri">لقاء صاحب السمو الملكي الأمير</h2>
            <div class="my-6">
                <img src="trky.png" class="max-w-[240px] mx-auto">
                <p class="font-bold text-gray-700 mt-4 text-xs Amiri">أمير منطقة عسير ورئيس هيئة تطويرها</p>
            </div>
            <div class="bg-green-50 p-6 rounded-2xl mb-8 border-r-8 border-moe-green">
                <p class="text-lg font-extrabold text-gray-800 Amiri">
                    بـحـرّاس وبـوَّابـي <br> مدارس تعليم عسير
                </p>
            </div>
            <button onclick="nextStep(2)" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold">
                تـسـجـيـل الـحـضـور
            </button>
        </div>

        <!-- الفورم -->
        <div id="step2" class="step">
            <h3 class="text-lg font-bold text-center mb-6">بيانات تأكيد الحضور</h3>

            <form id="attendanceForm" class="space-y-4">
                <input type="text" id="fullName" placeholder="الاسم الرباعي" required class="w-full p-4 bg-gray-50 border rounded-xl">
                <input type="number" id="nationalId" placeholder="السجل المدني" required class="w-full p-4 bg-gray-50 border rounded-xl">

                <select id="city" required class="w-full p-4 bg-gray-50 border rounded-xl">
                    <option value="" disabled selected>اختر المحافظة</option>
                    <option>أبها</option><option>خميس مشيط</option><option>بيشة</option>
                </select>

                <input type="number" id="phone" placeholder="رقم الجوال" required class="w-full p-4 bg-gray-50 border rounded-xl">
                <input type="text" id="school" placeholder="المدرسة" required class="w-full p-4 bg-gray-50 border rounded-xl">

                <button id="submitBtn" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold">
                    تأكيد الحضور والاستلام
                </button>
            </form>
        </div>

        <!-- النجاح -->
        <div id="step3" class="step text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto text-3xl">✓</div>
                <h3 class="text-xl font-bold mt-4">تم التسجيل بنجاح</h3>
            </div>

            <button onclick="downloadCertificate()" class="w-full bg-moe-gold text-white py-4 rounded-2xl font-bold">
                تحميل الشهادة PDF
            </button>
        </div>

    </div>
</div>

<script>

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhR6od8YBZZKPCgToZ-yE8pxL3I1QcRC0TrWXusITzQHq-phhys2C7B5z7ktYr9-v3nQ/exec";

let pdfLink = null;

// التنقل
function nextStep(step) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + step).classList.add('active');
}

// إرسال البيانات
document.getElementById('attendanceForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.innerHTML = "⏳ جاري إصدار الشهادة...";
    btn.disabled = true;

    const payload = {
        name: document.getElementById('fullName').value,
        id: document.getElementById('nationalId').value,
        city: document.getElementById('city').value,
        phone: document.getElementById('phone').value,
        school: document.getElementById('school').value
    };

    try {

        const res = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if(data.status === "success"){
            pdfLink = data.url;
            nextStep(3);
        } else {
            throw new Error(data.message);
        }

    } catch(err){
        alert("حدث خطأ");
        btn.disabled = false;
        btn.innerHTML = "تأكيد الحضور";
    }

});

// تحميل الشهادة
function downloadCertificate(){
    if(pdfLink){
        window.open(pdfLink, "_blank");
    } else {
        alert("لم يتم إنشاء الشهادة");
    }
}

</script>

</body>
</html>
