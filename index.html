<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد حضور لقاء تعليم عسير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; }
        .moe-green { color: #00735C; }
        .bg-moe-green { background-color: #00735C; }
        .bg-moe-gold { background-color: #a88532; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="p-6 text-center border-b border-gray-50 bg-white">
            <img src="logo.png" alt="وزارة التعليم" class="h-20 mx-auto object-contain">
        </div>

        <div class="p-8">
            <div id="step1" class="step active text-center">
                <p class="text-gray-500 text-sm mb-1 font-semibold">برعاية</p>
                <h2 class="text-xl font-bold moe-green mb-4 Amiri">لقاء صاحب السمو الملكي الأمير</h2>
                <div class="my-6">
                    <img src="trky.png" alt="تركي بن طلال" class="max-w-[240px] mx-auto">
                    <p class="font-bold text-gray-700 mt-4 text-xs Amiri leading-5">أمير منطقة عسير ورئيس هيئة تطويرها</p>
                </div>
                <div class="bg-green-50 p-6 rounded-2xl mb-8 border-r-8 border-moe-green shadow-inner text-center">
                    <p class="text-lg font-extrabold text-gray-800 leading-7 Amiri">بـحـرّاس وبـوَّابـي <br> مدارس تعليم عسير</p>
                </div>
                <button onclick="nextStep(2)" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">
                    تـسـجـيـل الـحـضـور
                </button>
            </div>

            <div id="step2" class="step">
                <h3 class="text-lg font-bold text-gray-800 mb-6 text-center border-b pb-2">بيانات تأكيد الحضور</h3>
                <form id="attendanceForm" class="space-y-4">
                    <input type="text" id="fullName" placeholder="الاسم الرباعي" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-sm">
                    <input type="number" id="nationalId" placeholder="السجل المدني (10 أرقام)" maxlength="10" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-sm text-right">
                    
                    <select id="city" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-sm">
                        <option value="" disabled selected>اختر المحافظة</option>
                        <option>أبها</option><option>خميس مشيط</option><option>بيشة</option>
                        <option>النماص</option><option>محايل عسير</option><option>ظهران الجنوب</option>
                        <option>سراة عبيدة</option><option>رجال ألمع</option><option>تثليث</option>
                        <option>تنومة</option><option>أحد رفيدة</option><option>المجاردة</option>
                        <option>بارق</option><option>بلقرن</option><option>الحرجة</option>
                    </select>
                    
                    <input type="number" id="phone" placeholder="رقم الجوال (05xxxxxxxx)" maxlength="10" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-sm text-right">
                    <input type="text" id="school" placeholder="المدرسة" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-sm text-right">

                    <button type="submit" id="submitBtn" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold text-base mt-4 shadow-md active:scale-95 transition-all">
                        تأكيد الحضور والاستلام
                    </button>
                </form>
            </div>

            <div id="step3" class="step text-center">
                <div class="mb-8">
                    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner font-bold">✓</div>
                    <h3 class="text-xl font-bold text-gray-800 Amiri">تم التسجيل بنجاح</h3>
                    <p class="text-gray-500 mt-2 text-xs">تم حفظ بياناتك وإصدار شهادتك بنجاح</p>
                </div>
                <button onclick="downloadCertificate()" class="w-full bg-moe-gold text-white py-5 rounded-2xl font-bold text-lg shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform">
                    <span>⬇</span> تحميل الشهادة PDF
                </button>
            </div>
        </div>
    </div>

    <div id="certificateTemplate" style="position: absolute; left: -9999px;">
        <div id="certContainer" style="width: 3508px; height: 2480px; position: relative; background-color: white;">
             <img src="certificate_bg.png" style="width: 3508px; height: 2480px; position: absolute; top: 0; left: 0;" crossorigin="anonymous">
             <div id="certNameTxt" style="position: absolute; top: 760px; right: 1150px; width: 1400px; text-align: right; font-size: 85px; font-weight: 800; color: #00735C; font-family: 'Amiri', serif; z-index: 10;">
                </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUVLrBph_Bp7bifSv0eLaIBb1LL2zYDlBec-41GFUO7-xQHzgAwFJLuqyC7m2rSAe2HA/exec';

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('fullName').value;
            const nationalId = document.getElementById('nationalId').value;

            btn.innerHTML = "جاري المعالجة...";
            btn.disabled = true;

            document.getElementById('certNameTxt').innerText = name;

            const element = document.getElementById('certContainer');
            const opt = {
                margin: 0,
                filename: 'temp.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 1, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'px', format: [3508, 2480], orientation: 'landscape', compress: true }
            };

            try {
                const pdfArrayBuffer = await html2pdf().set(opt).from(element).outputPdf('arraybuffer');
                const base64pdf = btoa(new Uint8Array(pdfArrayBuffer).reduce((data, byte) => data + String.fromCharCode(byte), ''));

                const payload = {
                    name: name,
                    id: nationalId,
                    city: document.getElementById('city').value,
                    phone: document.getElementById('phone').value,
                    school: document.getElementById('school').value,
                    pdfBase64: base64pdf
                };

                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                }).then(() => nextStep(3));

            } catch (error) {
                alert("حدث خطأ أثناء إصدار الشهادة");
                btn.disabled = false;
                btn.innerHTML = "تأكيد الحضور والاستلام";
            }
        });

        function downloadCertificate() {
            const element = document.getElementById('certContainer');
            html2pdf().from(element).set({
                margin: 0,
                filename: `شهادة_حضور_${document.getElementById('certNameTxt').innerText}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 1, useCORS: true },
                jsPDF: { unit: 'px', format: [3508, 2480], orientation: 'landscape', compress: true }
            }).save();
        }
    </script>
</body>
</html>
