<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد حضور لقاء تعليم عسير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Amiri:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .moe-green { color: #00735C; }
        .bg-moe-green { background-color: #00735C; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="p-6 text-center border-b border-gray-50">
            <img src="logo.png" alt="وزارة التعليم" class="h-16 mx-auto object-contain">
        </div>

        <div class="p-8">
            <div id="step1" class="step active text-center">
                <h2 class="text-xl font-bold moe-green mb-4 Amiri">لقاء صاحب السمو الملكي الأمير</h2>
                <img src="trky.png" alt="تركي بن طلال" class="max-w-[200px] mx-auto mb-6">
                <button onclick="nextStep(2)" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">تـسـجـيـل الـحـضـور</button>
            </div>

            <div id="step2" class="step">
                <form id="attendanceForm" class="space-y-4">
                    <input type="text" id="fullName" placeholder="الاسم الرباعي" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-green-600 text-right">
                    <input type="number" id="nationalId" placeholder="السجل المدني" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-right">
                    <select id="city" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-right">
                        <option value="" disabled selected>اختر المحافظة</option>
                        <option>أبها</option><option>خميس مشيط</option><option>بيشة</option><option>النماص</option><option>محايل عسير</option>
                    </select>
                    <input type="text" id="school" placeholder="المدرسة" required class="w-full p-4 bg-gray-50 border rounded-xl outline-none text-right">
                    <button type="submit" id="submitBtn" class="w-full bg-moe-green text-white py-4 rounded-2xl font-bold shadow-md">تأكيد البيانات</button>
                </form>
            </div>

            <div id="step3" class="step text-center">
                <div class="mb-8">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">✓</div>
                    <h3 class="text-xl font-bold text-gray-800 Amiri">تم الحفظ بنجاح</h3>
                </div>
                <button onclick="downloadCertificate()" class="w-full bg-amber-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-transform">⬇ تحميل الشهادة بدقة عالية</button>
            </div>
        </div>
    </div>

    <div id="certificateTemplate" style="position: absolute; left: -9999px; top: -9999px;">
        <div id="certContainer" style="width: 3508px; height: 2480px; position: relative; background-color: white;">
             <img src="certificate_bg.png" style="width: 3508px; height: 2480px; position: absolute; top: 0; left: 0;" crossorigin="anonymous">
             
             <div id="certNameTxt" style="position: absolute; top: 745px; right: 1140px; width: 1400px; text-align: right; font-size: 88px; font-weight: 800; color: #00735C; font-family: 'Amiri', serif; z-index: 10;">
                </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUVLrBph_Bp7bifSv0eLaIBb1LL2zYDlBec-41GFUO7-xQHzgAwFJLuqyC7m2rSAe2HA/exec';

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
        }

        document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('fullName').value;
            
            btn.innerHTML = "جاري الحفظ...";
            btn.disabled = true;

            document.getElementById('certNameTxt').innerText = name;

            const element = document.getElementById('certContainer');
            const opt = {
                margin: 0,
                filename: `شهادة_${name}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 1, useCORS: true, letterRendering: true, logging: false },
                jsPDF: { unit: 'px', format: [3508, 2480], orientation: 'landscape', compress: true }
            };

            try {
                // إرسال البيانات لجوجل شيت أولاً
                const payload = {
                    name: name,
                    id: document.getElementById('nationalId').value,
                    city: document.getElementById('city').value,
                    school: document.getElementById('school').value
                };

                fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
                .then(() => nextStep(3));

            } catch (err) {
                alert("حدث خطأ في الاتصال، حاول مرة أخرى");
                btn.disabled = false;
            }
        });

        function downloadCertificate() {
            const element = document.getElementById('certContainer');
            html2pdf().from(element).set({
                margin: 0,
                filename: `شهادة_${document.getElementById('certNameTxt').innerText}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 1, useCORS: true },
                jsPDF: { unit: 'px', format: [3508, 2480], orientation: 'landscape' }
            }).save();
        }
    </script>
</body>
</html>
